version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: clauseguide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clauseguide
      POSTGRES_PASSWORD: clauseguide
      POSTGRES_DB: clauseguide
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clauseguide -d clauseguide"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
